# Local development compose. It builds the production Dockerfiles but overrides
# the run command + mounts source for hot-reload. Anonymous volumes preserve the
# image-built dependencies (.venv / node_modules) so the host mount doesn't shadow
# them. For a production run, use the images directly (no command override / mounts).
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoria_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-memoria}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-memoria}:${POSTGRES_PASSWORD:-memoria_dev_password}@postgres:5432/${POSTGRES_DB:-memoria}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/.venv  # keep the image-built venv, don't shadow it with the host mount
    # Dev override: hot-reload. The prod image default runs uvicorn without --reload.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  website:
    build:
      context: ./website
      target: deps  # dev only needs node_modules; skip the prod build stage
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./website:/app
      - /app/node_modules  # preserve the image-installed deps
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    # Dev override: Next dev server. The prod image runs `node server.js` (standalone).
    command: npm run dev
    depends_on:
      - backend

volumes:
  postgres_data:
